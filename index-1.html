<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adult Couple Spin Wheel</title>

<style>
body {
    margin: 0;
    background: #121214;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
}

h1 {
    margin: 10px 0;
    color: #ff5ea8;
    text-shadow: 0 0 10px rgba(255, 94, 168, 0.3);
    font-size: 28px;
    text-align: center;
}

#setupPanel {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 94, 168, 0.3);
    border-radius: 20px;
    padding: 20px 25px;
    margin: 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    width: 260px;
}

#setupPanel label {
    font-size: 14px;
    color: #ffd5e7;
    align-self: flex-start;
}

#setupPanel input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255, 94, 168, 0.4);
    background: #1a1a1e;
    color: #fff;
    font-size: 16px;
    box-sizing: border-box;
}

#setupPanel input:focus {
    outline: none;
    border-color: #ff5ea8;
}

#turnBanner {
    font-size: 18px;
    color: #ffd5e7;
    margin-top: 5px;
    min-height: 24px;
    font-weight: bold;
    text-align: center;
}

#wheelContainer {
    position: relative;
    width: 440px;
    height: 440px;
    margin: 15px auto;
}

canvas {
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(255, 0, 120, 0.35);
    background: #1a1a1e;
    display: block;
}

#pointer {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 36px solid gold;
    z-index: 10;
    filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
    transform-origin: center top;
}

button {
    margin-top: 15px;
    padding: 14px 45px;
    font-size: 22px;
    font-weight: bold;
    border: none;
    border-radius: 30px;
    background: linear-gradient(45deg, #ff2d7a, #ff5ea8);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(255, 45, 122, 0.4);
    transition: all 0.2s ease;
}

button:hover {
    background: linear-gradient(45deg, #ff4d91, #ff7db7);
    transform: translateY(-2px);
    box-shadow: 0 7px 20px rgba(255, 45, 122, 0.6);
}

button:disabled {
    background: #444;
    color: #888;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
}

#result {
    margin: 20px;
    max-width: 600px;
    text-align: center;
    font-size: 24px;
    min-height: 70px;
    color: #ffd5e7;
    font-weight: 500;
    line-height: 1.4;
    padding: 0 15px;
}

.highlight-dare {
    color: #fff;
    background: rgba(255, 45, 122, 0.2);
    padding: 8px 20px;
    border-radius: 15px;
    display: inline-block;
    border: 1px solid rgba(255, 45, 122, 0.4);
    box-shadow: 0 0 15px rgba(255, 45, 122, 0.2);
    animation: popIn 0.4s ease-out forwards;
}

@keyframes popIn {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

.hidden {
    display: none !important;
}

@media (max-width: 500px) {
    #wheelContainer {
        width: 320px;
        height: 320px;
    }
    canvas {
        width: 300px;
        height: 300px;
    }
    h1 { font-size: 22px; }
    #result { font-size: 18px; }
    button { font-size: 18px; padding: 12px 35px; }
}
</style>
</head>
<body>

<h1>❤️ Couple Spin Wheel ❤️</h1>

<div id="setupPanel">
    <label for="name1Input">Partner 1 name</label>
    <input type="text" id="name1Input" placeholder="e.g. Shawn" maxlength="20">
    <label for="name2Input">Partner 2 name</label>
    <input type="text" id="name2Input" placeholder="e.g. Partner's name" maxlength="20">
    <button id="startBtn" onclick="startGame()">START</button>
</div>

<div id="turnBanner" class="hidden"></div>

<div id="wheelContainer" class="hidden">
    <div id="pointer"></div>
    <canvas id="wheel" width="420" height="420"></canvas>
</div>

<button id="spinBtn" class="hidden" onclick="spin()">SPIN</button>

<div id="result" class="hidden">Spin the wheel to get your romantic dare...</div>

<script>
const dares = [
    "30-second hug",
    "50-second kiss",
    "Kiss and lick  their neck",
    "Whisper a fantasy",
    "3 compliments",
    "Slow dance on lap",
    "Eye contact 30 sec",
    "Forehead kiss",
    "Back hug and robot mode",
    "Favorite memory together",
    "Feed your partner",
    "Hair caress",
    "Butterfly kisses",
    "Trace a heart where you please",
    "Shoulder massage",
    "Foot massage",
    "Hands exploration",
    "Kiss every finger",
    "Cuddle 5 min",
    "Sit on their lap"
];

// Working copy of dares that shrinks as they get picked, so nothing repeats
let remainingDares = [...dares];

const colors = [
    "#ff4d6d", "#ff7aa2", "#ff9fb2", "#ff5c8d",
    "#ff88aa", "#f06292", "#ec407a", "#d81b60",
    "#ad1457", "#c2185b", "#ff4d6d", "#ff7aa2",
    "#ff9fb2", "#ff5c8d", "#ff88aa", "#f06292",
    "#ec407a", "#d81b60", "#ad1457", "#c2185b"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const spinBtn = document.getElementById("spinBtn");
const pointer = document.getElementById("pointer");
const resultDiv = document.getElementById("result");
const turnBanner = document.getElementById("turnBanner");
const wheelContainer = document.getElementById("wheelContainer");
const setupPanel = document.getElementById("setupPanel");

const size = canvas.width;
const center = size / 2;
const radius = center - 10;

let currentRotation = 0;
let isSpinning = false;

// --- Turn / player state ---
let players = [];       // e.g. ["Shawn", "Partner"]
let currentTurn = 0;    // index into players
let totalSpinsUsed = 0; // total dares picked so far across both players

function startGame() {
    const name1 = document.getElementById("name1Input").value.trim() || "Partner 1";
    const name2 = document.getElementById("name2Input").value.trim() || "Partner 2";

    players = [name1, name2];
    currentTurn = 0;
    totalSpinsUsed = 0;
    remainingDares = [...dares];

    setupPanel.classList.add("hidden");
    wheelContainer.classList.remove("hidden");
    spinBtn.classList.remove("hidden");
    resultDiv.classList.remove("hidden");
    turnBanner.classList.remove("hidden");

    resultDiv.innerHTML = "Spin the wheel to get your romantic dare...";
    updateTurnBanner();
    drawWheel();
}

function updateTurnBanner() {
    if (remainingDares.length === 0) {
        turnBanner.innerHTML = "All dares done — game over! 💕";
        spinBtn.disabled = true;
        spinBtn.innerHTML = "GAME OVER";
        return;
    }
    turnBanner.innerHTML = `👉 ${players[currentTurn]}'s turn to spin`;
    spinBtn.innerHTML = `SPIN (${players[currentTurn]})`;
}

function drawWheel() {
    const totalSegments = remainingDares.length;

    ctx.clearRect(0, 0, size, size);

    if (totalSegments === 0) {
        // Nothing left to draw
        ctx.beginPath();
        ctx.arc(center, center, radius, 0, Math.PI * 2);
        ctx.fillStyle = "#1a1a1e";
        ctx.fill();
        ctx.fillStyle = "#ff5ea8";
        ctx.font = "bold 16px Arial";
        ctx.textAlign = "center";
        ctx.fillText("No dares left", center, center);
        return;
    }

    const arc = (Math.PI * 2) / totalSegments;

    for (let i = 0; i < totalSegments; i++) {
        let angle = i * arc;

        // Draw individual slice
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, angle, angle + arc);
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.stroke();

        // Place and rotate slice typography safely
        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(angle + arc / 2);
        ctx.fillStyle = "white";

        // Dynamic text configuration for longer actions
        ctx.font = "bold 11px Arial";
        ctx.textAlign = "right";
        ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
        ctx.shadowBlur = 4;

        ctx.fillText(remainingDares[i], radius - 15, 4);
        ctx.restore();
    }

    // Inner center aesthetics ring
    ctx.beginPath();
    ctx.arc(center, center, 40, 0, Math.PI * 2);
    ctx.fillStyle = "#111113";
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = "gold";
    ctx.stroke();

    // Center branding accent text
    ctx.fillStyle = "#ff5ea8";
    ctx.font = "bold 13px Arial";
    ctx.textAlign = "center";
    ctx.shadowBlur = 0;
    ctx.fillText("LOVE", center, center + 5);
}

function spin() {
    if (isSpinning) return;
    if (remainingDares.length === 0) {
        resultDiv.innerHTML = "No dares left on the wheel!";
        return;
    }

    isSpinning = true;
    spinBtn.disabled = true;
    resultDiv.innerHTML = "The wheel is turning...";

    const segmentArcDegrees = 360 / remainingDares.length;
    const spinDuration = 5000;

    // Choose a distinct target slice randomly from what's left
    const targetTargetIndex = Math.floor(Math.random() * remainingDares.length);

    // Compute total targeted calculation offset adjustments
    // 270 degrees compensates canvas right-side 0-index pointing logic up to top indicator pointer position
    const targetDegrees = (270 - (targetTargetIndex * segmentArcDegrees) - (segmentArcDegrees / 2));

    // Ensure rotation strictly maintains forward progressive paths
    const targetExtraSpins = 360 * 6;
    const currentBaseOffset = currentRotation - (currentRotation % 360);

    currentRotation = currentBaseOffset + targetExtraSpins + ((targetDegrees + 360) % 360);

    // Bind transition metrics directly to engine
    canvas.style.transition = `transform ${spinDuration}ms cubic-bezier(0.15, 0.85, 0.2, 1)`;
    canvas.style.transform = `rotate(${currentRotation}deg)`;

    // Simulated ticking motion tracker loop
    let lastTickSegment = -1;
    const startTime = performance.now();
    const segCountAtSpinStart = remainingDares.length;

    function animateTicks() {
        if (!isSpinning) return;

        const now = performance.now();
        const elapsed = now - startTime;

        if (elapsed < spinDuration) {
            // Cubic bezier structural timing interpolation calculation matching CSS transition
            const progress = elapsed / spinDuration;
            const t = 1 - Math.pow(1 - progress, 3); // Approximate ease-out curve
            const currentAnimatedDeg = currentRotation * t;

            // Map degrees into correct indicator segments
            const segArc = 360 / segCountAtSpinStart;
            const activeSegmentIndex = Math.floor(((270 - (currentAnimatedDeg % 360) + 360) % 360) / segArc) % segCountAtSpinStart;

            if (activeSegmentIndex !== lastTickSegment) {
                lastTickSegment = activeSegmentIndex;
                triggerPointerTickVisual();
            }
            requestAnimationFrame(animateTicks);
        }
    }
    requestAnimationFrame(animateTicks);

    setTimeout(() => {
        showResult(targetTargetIndex);
    }, spinDuration);
}

function triggerPointerTickVisual() {
    pointer.style.transform = "translateX(-50%) rotate(-15deg)";
    setTimeout(() => {
        pointer.style.transform = "translateX(-50%) rotate(0deg)";
    }, 100);
}

function showResult(winningIndex) {
    isSpinning = false;

    const winningDare = remainingDares[winningIndex];
    const playerName = players[currentTurn];

    // Safely output mapped element data string updates
    resultDiv.innerHTML =
        `<strong>${playerName}'s Dare:</strong><br><br><span class="highlight-dare">${winningDare}</span>`;

    // Remove the dare so it can never repeat
    remainingDares.splice(winningIndex, 1);

    // Track total spins used (informational)
    totalSpinsUsed += 1;

    // Reset wheel rotation visually so next spin starts clean, then redraw fewer segments
    canvas.style.transition = "none";
    canvas.style.transform = "rotate(0deg)";
    currentRotation = 0;
    drawWheel();

    // Pause 4 seconds on this result before handing off to the next partner
    turnBanner.innerHTML = "Enjoy the moment... 💕";
    setTimeout(() => {
        // Always alternate to the other partner, as long as dares remain
        if (remainingDares.length > 0) {
            currentTurn = 1 - currentTurn;
            spinBtn.disabled = false;
        }
        updateTurnBanner();
    }, 4000);
}

// Initial draw sequence setup (wheel stays hidden until game starts)
drawWheel();
</script>

</body>
</html>
