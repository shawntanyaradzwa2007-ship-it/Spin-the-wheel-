<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adult Couple Spin Wheel</title>

<style>
body {

    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow-x: hidden;
}
h1 { margin: 10px 0; color: #ff5ea8; text-shadow: 0 0 10px rgba(255, 94, 168, 0.3); font-size: 28px; text-align: center; }
#setupPanel { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 94, 168, 0.3); border-radius: 20px; padding: 20px 25px; margin: 10px; display: flex; flex-direction: column; gap: 12px; align-items: center; width: 260px; }
#setupPanel label { font-size: 14px; color: #ffd5e7; align-self: flex-start; }
#setupPanel input { width: 100%; padding: 10px 14px; border-radius: 20px; border: 1px solid rgba(255, 94, 168, 0.4); background: #1a1a1e; color: #fff; font-size: 16px; box-sizing: border-box; }
#setupPanel input:focus { outline: none; border-color: #ff5ea8; }
#turnBanner { font-size: 18px; color: #ffd5e7; margin-top: 5px; min-height: 24px; font-weight: bold; text-align: center; }
#wheelContainer { position: relative; width: 440px; height: 440px; margin: 15px auto; }
canvas { border-radius: 50%; box-shadow: 0 0 30px rgba(255, 0, 120, 0.35); background: #1a1a1e; display: block; }
#pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; border-top: 36px solid gold; z-index: 10; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5)); transform-origin: center top; }
button { margin-top: 15px; padding: 14px 45px; font-size: 22px; font-weight: bold; border: none; border-radius: 30px; background: linear-gradient(45deg, #ff2d7a, #ff5ea8); color: white; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 45, 122, 0.4); transition: all 0.2s ease; }
button:hover { background: linear-gradient(45deg, #ff4d91, #ff7db7); transform: translateY(-2px); box-shadow: 0 7px 20px rgba(255, 45, 122, 0.6); }
button:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; transform: none; }
#result { margin: 20px; max-width: 600px; text-align: center; font-size: 24px; min-height: 70px; color: #ffd5e7; font-weight: 500; line-height: 1.4; padding: 0 15px; }
.highlight-dare { color: #fff; background: rgba(255, 45, 122, 0.2); padding: 8px 20px; border-radius: 15px; display: inline-block; border: 1px solid rgba(255, 45, 122, 0.4); box-shadow: 0 0 15px rgba(255, 45, 122, 0.2); animation: popIn 0.4s ease-out forwards; }
@keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; }
.hidden { display: none !important; }
@media (max-width: 500px) { #wheelContainer { width: 320px; height: 320px; } canvas { width: 300px; height: 300px; } h1 { font-size: 22px; } #result { font-size: 18px; } button { font-size: 18px; padding: 12px 35px; }
</style>
</head>
<body>

<h1>❤️ Couple Spin Wheel ❤️</h1>

<div id="setupPanel">
    <label for="name1Input">Partner 1 name</label>
    <input type="text" id="name1Input" placeholder="e.g. Shawn" maxlength="20">
    <label for="name2Input">Partner 2 name</label>
    <input type="text" id="name2Input" placeholder="e.g. Partner's name" maxlength="20">
    <button id="startBtn" onclick="startGame()">START</button>
</div>

<div id="turnBanner" class="hidden"></div>

<div id="wheelContainer" class="hidden">
    <div id="pointer"></div>
    <canvas id="wheel" width="420" height="420"></canvas>
</div>

<button id="spinBtn" class="hidden" onclick="spin()">SPIN</button>

<div id="result" class="hidden">Spin the wheel to get your romantic dare...</div>
